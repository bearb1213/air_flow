# ============================================================
#  Apache Airflow — Entrepôt PostgreSQL (local) + Sources MySQL / Excel / CSV
#  Seul Airflow tourne dans Docker ; PostgreSQL et MySQL sont sur ta machine.
# ============================================================
#
#  AVANT DE LANCER :
#  1. Crée les dossiers locaux :
#       mkdir -p ./dags ./logs ./plugins ./data
#  2. Crée le fichier .env :
#       echo -e "AIRFLOW_UID=$(id -u)" > .env
#  3. Initialise la base Airflow :
#       docker compose up airflow-init
#  4. Lance tout :
#       docker compose up -d
#  5. Interface Web : http://localhost:8080  (admin / admin)
#
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    # ----- Core -----
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # ----- Base de metadonnees Airflow -> ton PostgreSQL LOCAL -----
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/airflow

    # ----- API -----
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'

    # ----- Webserver -----
    AIRFLOW__WEBSERVER__SECRET_KEY: 'change_me_in_production'

    # ----- Connexions ETL Traiteur -----
    # Base source : traiteur (tables employes, clients, plats, etc.)
    AIRFLOW_CONN_POSTGRES_TRAITEUR: "postgresql://postgres:postgres@host.docker.internal:5432/traiteur"
    # Base data warehouse : traiteur_dwh (tables dim_* et fait_traiteur)
    AIRFLOW_CONN_POSTGRES_TRAITEUR_DWH: "postgresql://postgres:postgres@host.docker.internal:5432/traiteur_dwh"

    # ----- Email / SMTP (Gmail App Password) -----
    # Creer un App Password sur : https://myaccount.google.com/apppasswords
    AIRFLOW__SMTP__SMTP_HOST: 'smtp.gmail.com'
    AIRFLOW__SMTP__SMTP_STARTTLS: 'true'
    AIRFLOW__SMTP__SMTP_SSL: 'false'
    AIRFLOW__SMTP__SMTP_PORT: '587'
    AIRFLOW__SMTP__SMTP_USER: '${SMTP_USER:-ton_email@gmail.com}'
    AIRFLOW__SMTP__SMTP_PASSWORD: '${SMTP_PASSWORD:-}'
    AIRFLOW__SMTP__SMTP_MAIL_FROM: '${SMTP_USER:-ton_email@gmail.com}'

    # ----- Providers pip supplémentaires -----
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      apache-airflow-providers-postgres
      apache-airflow-providers-mysql
      pandas
      openpyxl
      xlrd
      sqlalchemy
      psycopg2-binary

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data          # place ici tes fichiers Excel / CSV

  extra_hosts:
    - "host.docker.internal:host-gateway"

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    airflow-init:
      condition: service_completed_successfully

# ============================================================

services:

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"
    depends_on: {}

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow_triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped